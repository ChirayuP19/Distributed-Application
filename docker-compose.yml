services:

  mongo:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: chirayu
      MONGO_INITDB_ROOT_PASSWORD: chirayu
    volumes:
      - mongo-data:/data/db
    networks:
      - custom-bridge
    restart: unless-stopped

  mongo-express:
    image: mongo-express:latest
    container_name: mongodb-express
    ports:
      - "9000:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: chirayu
      ME_CONFIG_MONGODB_ADMINPASSWORD: chirayu
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    depends_on:
      - mongo
    networks:
      - custom-bridge
    restart: unless-stopped

  postgres:
    image: postgres:14
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: chirayu
      POSTGRES_PASSWORD: chirayu
      POSTGRES_DB: chirayu
    volumes:
      - postgres-data:/var/lib/postgresql
    restart: unless-stopped
    networks:
      - custom-bridge


  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_panel
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: chirayu010675@gmail.com
      PGADMIN_DEFAULT_PASSWORD: chirayu
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - custom-bridge

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - custom-bridge


networks:
  custom-bridge:
    driver: bridge

volumes:
  mongo-data:
  postgres-data:
  redis-data:

