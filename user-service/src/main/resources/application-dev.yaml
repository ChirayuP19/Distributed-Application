spring:
  application:
    name: user-service
  data:
    mongodb:
      uri: mongodb://chirayu:chirayu@localhost:27017/userdb?authSource=admin
  redis:
    host: localhost
    port: 6379
  cache:
    type: redis
server:
  port: 8050
eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
management:
  endpoints:
    web:
      exposure:
        include: "*"
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
