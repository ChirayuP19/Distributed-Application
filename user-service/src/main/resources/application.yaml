spring:
  application:
    name: user-service
  data:
    mongodb:
      uri: mongodb://chirayu:chirayu@localhost:27017/userdb?authSource=admin
  redis:
    host: localhost
    port: 6379
  cache:
    type: redis
server:
  port: 8050
eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
management:
  endpoints:
    web:
      exposure:
        include: "*"
